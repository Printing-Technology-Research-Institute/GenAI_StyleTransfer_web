<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontext 風格轉換</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0c0f;
  --surface: #13131a;
  --surface2: #1a1a24;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.15);
  --text: #f0eeff;
  --muted: #6b6a7e;
  --accent: #c8b4ff;
  --accent2: #7ed6c8;

  /* Style accent colors */
  --ghibli: #8ecb7a;
  --jojo: #ff7c6e;
  --van:   #f6c35a;
  --picasso: #6eb5ff;
  --chibi: #f48bce;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 32px 24px 60px;
  overflow-x: hidden;
}

/* Ambient background blobs */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
body::before {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(200,180,255,0.06) 0%, transparent 70%);
  top: -100px; left: -100px;
}
body::after {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(126,214,200,0.05) 0%, transparent 70%);
  bottom: -100px; right: -100px;
}

.page { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }

/* ─── Header ─── */
.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 40px;
}
.header-left h1 {
  font-family: 'Syne', sans-serif;
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1;
  background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-left p {
  color: var(--muted);
  font-size: 0.9rem;
  margin-top: 6px;
  font-weight: 300;
  letter-spacing: 0.01em;
}

/* Settings icon button */
.settings-btn {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.settings-btn:hover { border-color: var(--border-hover); color: var(--text); }
.settings-btn svg { width: 18px; height: 18px; }

/* ─── Style Tabs ─── */
.style-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.style-tab {
  padding: 9px 18px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.style-tab:hover { border-color: var(--border-hover); color: var(--text); }
.style-tab.active[data-style="ghibli"]  { background: rgba(142,203,122,0.12); border-color: var(--ghibli); color: var(--ghibli); }
.style-tab.active[data-style="jojo"]    { background: rgba(255,124,110,0.12); border-color: var(--jojo);   color: var(--jojo);   }
.style-tab.active[data-style="van"]     { background: rgba(246,195,90,0.12);  border-color: var(--van);    color: var(--van);    }
.style-tab.active[data-style="picasso"] { background: rgba(110,181,255,0.12); border-color: var(--picasso);color: var(--picasso);}
.style-tab.active[data-style="chibi"]   { background: rgba(244,139,206,0.12); border-color: var(--chibi);  color: var(--chibi);  }

/* ─── Main Card ─── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}

/* ─── Upload Area ─── */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 14px;
  height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
  background: var(--surface2);
}
.upload-zone:hover {
  border-color: var(--border-hover);
  background: rgba(255,255,255,0.02);
}
.upload-zone.dragging {
  border-color: var(--accent);
  background: rgba(200,180,255,0.04);
}
.upload-zone.has-image {
  border-style: solid;
  border-color: transparent;
  padding: 0;
}
.upload-zone.has-image:hover { opacity: 0.88; }
.upload-zone.has-image .upload-placeholder { display: none; }
.upload-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  pointer-events: none;
}
.upload-placeholder .icon { font-size: 2.5rem; opacity: 0.4; }
.upload-placeholder .label {
  font-size: 0.9rem; color: var(--muted); font-weight: 400;
}
.upload-placeholder .sub {
  font-size: 0.78rem; color: var(--muted); opacity: 0.6;
}
.upload-zone .preview-img {
  display: none;
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 12px;
}
.upload-zone.has-image .preview-img { display: block; }
.upload-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}

/* ─── Layout ─── */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}

.panel {
  padding: 28px;
}
.panel + .panel {
  border-left: 1px solid var(--border);
}

.panel-label {
  font-family: 'Syne', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

/* Result panel */
.result-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 320px;
  position: relative;
}
.result-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  color: var(--muted); text-align: center;
}
.result-placeholder .icon { font-size: 3rem; opacity: 0.2; }
.result-placeholder .label { font-size: 0.88rem; font-weight: 300; }
.result-img-wrap { display: none; flex-direction: column; align-items: center; gap: 16px; width: 100%; }
.result-img-wrap.show { display: flex; animation: fadeUp 0.4s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.result-img {
  max-width: 100%;
  max-height: 320px;
  object-fit: contain;
  border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* ─── Bottom bar ─── */
.bottom-bar {
  padding: 20px 28px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

/* Style indicator strip */
.style-indicator {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}
.style-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background 0.3s;
}
.style-name {
  font-family: 'Syne', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  transition: color 0.3s;
}
.style-desc { font-size: 0.75rem; color: var(--muted); font-weight: 300; }

/* Submit button */
.submit-btn {
  padding: 12px 28px;
  border-radius: 100px;
  border: none;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color: #0c0c0f;
  font-family: 'Syne', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 8px;
  white-space: nowrap;
}
.submit-btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(200,180,255,0.3);
}
.submit-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
.submit-btn.style-ghibli  { background: linear-gradient(135deg, var(--ghibli), #b0e89e); }
.submit-btn.style-jojo    { background: linear-gradient(135deg, var(--jojo), #ffb09e); }
.submit-btn.style-van     { background: linear-gradient(135deg, var(--van), #f9dc8e); }
.submit-btn.style-picasso { background: linear-gradient(135deg, var(--picasso), #9eceff); }
.submit-btn.style-chibi   { background: linear-gradient(135deg, var(--chibi), #f8b8de); }

/* Download btn */
.dl-btn {
  padding: 8px 18px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.dl-btn:hover { border-color: var(--border-hover); color: var(--text); }

/* Spinner */
.spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(0,0,0,0.2);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
.spinner.show { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Error / Status ─── */
.status-bar {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 0.83rem;
  display: none;
}
.status-bar.error { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); color: #ff6b6b; display: block; }
.status-bar.info  { background: rgba(200,180,255,0.07); border: 1px solid rgba(200,180,255,0.15); color: var(--accent); display: block; }

/* ─── Settings Modal ─── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border: 1px solid var(--border-hover);
  border-radius: 20px;
  width: 100%;
  max-width: 460px;
  overflow: hidden;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { transform: translateY(16px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.modal-header {
  padding: 22px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
}
.modal-close {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  transition: all 0.15s;
}
.modal-close:hover { color: var(--text); border-color: var(--border-hover); }

.modal-body { padding: 20px 24px 28px; }

.field { margin-bottom: 20px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
  font-family: 'Syne', sans-serif;
}
.field input[type="text"],
.field input[type="url"] {
  width: 100%;
  padding: 11px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  transition: border-color 0.2s;
  outline: none;
}
.field input:focus { border-color: var(--accent); }
.field .hint { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

.save-btn {
  width: 100%;
  padding: 12px;
  border-radius: 100px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #0c0c0f;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  margin-top: 4px;
  transition: all 0.2s;
}
.save-btn:hover { opacity: 0.9; transform: translateY(-1px); }

@media (max-width: 640px) {
  .main-layout { grid-template-columns: 1fr; }
  .panel + .panel { border-left: none; border-top: 1px solid var(--border); }
  .bottom-bar { flex-wrap: wrap; }
  .style-tabs { gap: 6px; }
  .style-tab { padding: 7px 14px; font-size: 0.78rem; }
}
</style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>Kontext 風格轉換</h1>
      <p>Flux Kontext · LoRA 驅動 · 五種藝術風格</p>
    </div>
    <button class="settings-btn" onclick="openSettings()" title="API 設定">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Style Tabs -->
  <div class="style-tabs">
    <button class="style-tab active" data-style="ghibli" onclick="selectStyle('ghibli', this)">🌸 Studio Ghibli</button>
    <button class="style-tab" data-style="jojo"    onclick="selectStyle('jojo', this)">⚡ JoJo 風格</button>
    <button class="style-tab" data-style="van"     onclick="selectStyle('van', this)">🎨 梵谷風格</button>
    <button class="style-tab" data-style="picasso" onclick="selectStyle('picasso', this)">🧩 畢卡索風格</button>
    <button class="style-tab" data-style="chibi"   onclick="selectStyle('chibi', this)">🎮 3D Chibi</button>
  </div>

  <!-- Main Card -->
  <div class="card">
    <div class="main-layout">

      <!-- Left: Upload -->
      <div class="panel">
        <div class="panel-label">上傳原圖</div>
        <div class="upload-zone" id="uploadZone"
             ondragover="onDragOver(event)"
             ondragleave="onDragLeave(event)"
             ondrop="onDrop(event)">
          <div class="upload-placeholder">
            <div class="icon">📷</div>
            <div class="label">點擊選擇圖片</div>
            <div class="sub">或拖放圖片到這裡 · JPG / PNG / WEBP</div>
          </div>
          <input type="file" id="imageInput" accept="image/*" onchange="handleFile(event)">
          <img id="previewImg" class="preview-img" alt="preview">
        </div>
      </div>

      <!-- Right: Result -->
      <div class="panel">
        <div class="panel-label">轉換結果</div>
        <div class="result-panel">
          <div class="result-placeholder" id="resultPlaceholder">
            <div class="icon">🖼️</div>
            <div class="label">結果將顯示在這裡</div>
          </div>
          <div class="result-img-wrap" id="resultWrap">
            <img id="resultImg" class="result-img" alt="result">
            <button class="dl-btn" onclick="downloadResult()">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              下載
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
      <div class="style-indicator">
        <div class="style-dot" id="styleDot"></div>
        <div>
          <div class="style-name" id="styleName">Studio Ghibli</div>
          <div class="style-desc" id="styleDesc">柔和水彩 · 暖色調 · 手繪感</div>
        </div>
      </div>
      <button class="submit-btn style-ghibli" id="submitBtn" onclick="processImage()">
        <div class="spinner" id="spinner"></div>
        <span id="submitLabel">開始轉換</span>
      </button>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar" id="statusBar"></div>

</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">⚙️ API 設定</div>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>ComfyUI API URL</label>
        <input type="url" id="apiUrlInput" placeholder="http://127.0.0.1:8188" value="http://127.0.0.1:8188">
        <div class="hint">ComfyUI 伺服器位址，預設為本機 8188 port</div>
      </div>
      <button class="save-btn" onclick="saveSettings()">儲存設定</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
var currentStyle  = 'ghibli';
var selectedFile  = null;
var resultBlob    = null;

var STYLES = {
  ghibli: {
    name: 'Studio Ghibli',
    desc: '柔和水彩 · 暖色調 · 手繪感',
    color: 'var(--ghibli)',
    loraName: 'ghibliStyle_kontext_byJaneB.safetensors',
    prompt: 'Transform to Studio Ghibli style with soft watercolor shading, warm lighting, hand-drawn animation look, and pastel color palette, while maintaining the original composition, character details, facial features, textures, and all scene elements unchanged',
    saveNodeId: '197',
  },
  jojo: {
    name: 'JoJo 風格',
    desc: '強烈線條 · 戲劇光影 · 誇張姿態',
    color: 'var(--jojo)',
    loraName: 'Kontext_OmniConsistency_lora .safetensors',
    prompt: 'Transform it into JoJo style, while strictly preserving the original structure, pose, and composition unchanged',
    saveNodeId: '281',
  },
  van: {
    name: '梵谷風格',
    desc: '旋轉筆觸 · 濃厚油彩 · 星空感',
    color: 'var(--van)',
    loraName: 'Kontext_OmniConsistency_lora .safetensors',
    prompt: 'transform it into Van Gogh style, while strictly preserving the original structure, pose, and composition unchanged',
    saveNodeId: '290',
  },
  picasso: {
    name: '畢卡索風格',
    desc: '立體主義 · 幾何分割 · 多視角',
    color: 'var(--picasso)',
    loraName: 'Kontext_OmniConsistency_lora .safetensors',
    prompt: 'transform it into Picasso style, while strictly preserving the original structure, pose, and composition unchanged',
    saveNodeId: '307',
  },
  chibi: {
    name: '3D Chibi',
    desc: '圓潤 3D · Q 版可愛 · 玩具感',
    color: 'var(--chibi)',
    loraName: 'Kontext_OmniConsistency_lora .safetensors',
    prompt: 'Transform it into 3D chibi style, while strictly preserving the original structure, pose, and composition unchanged',
    saveNodeId: '314',
  },
};

// ─── Settings ─────────────────────────────────────────────────────────────────
function getApiUrl() {
  return localStorage.getItem('komtextApiUrl') || 'http://127.0.0.1:8188';
}
function openSettings() {
  document.getElementById('apiUrlInput').value = getApiUrl();
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}
function closeOnOverlay(e) {
  if (e.target === document.getElementById('settingsModal')) closeSettings();
}
function saveSettings() {
  var url = document.getElementById('apiUrlInput').value.trim().replace(/\/$/, '');
  if (!url) { alert('請輸入 API URL'); return; }
  localStorage.setItem('komtextApiUrl', url);
  closeSettings();
  showStatus('設定已儲存', 'info');
}

// ─── Style Selection ──────────────────────────────────────────────────────────
function selectStyle(style, btn) {
  currentStyle = style;

  document.querySelectorAll('.style-tab').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');

  var s = STYLES[style];
  document.getElementById('styleDot').style.background = s.color;
  document.getElementById('styleName').style.color = s.color;
  document.getElementById('styleName').textContent = s.name;
  document.getElementById('styleDesc').textContent = s.desc;

  var sb = document.getElementById('submitBtn');
  sb.className = 'submit-btn style-' + style;
}

// ─── File Handling ────────────────────────────────────────────────────────────
// 相片紙尺寸上限：4×6吋 @ 300dpi = 1800×1200px
// 保持原比例縮小，不會放大小圖
var PHOTO_MAX_PX = 1800;

function handleFile(e) {
  var file = e.target.files[0];
  setFile(file);
}

function setFile(file) {
  if (!file || !file.type.startsWith('image/')) return;

  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var w = img.naturalWidth;
      var h = img.naturalHeight;
      var longSide = Math.max(w, h);

      // 如果已在尺寸內就直接用，不做任何處理
      if (longSide <= PHOTO_MAX_PX) {
        selectedFile = file;
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('uploadZone').classList.add('has-image');
        showSizeInfo(w, h, w, h, false);
        return;
      }

      // Canvas resize，保持比例
      var scale = PHOTO_MAX_PX / longSide;
      var newW = Math.round(w * scale);
      var newH = Math.round(h * scale);

      var canvas = document.createElement('canvas');
      canvas.width  = newW;
      canvas.height = newH;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, newW, newH);

      canvas.toBlob(function(blob) {
        selectedFile = new File([blob], file.name.replace(/\.[^.]+$/, '') + '_resized.jpg', { type: 'image/jpeg' });
        var previewUrl = URL.createObjectURL(blob);
        document.getElementById('previewImg').src = previewUrl;
        document.getElementById('uploadZone').classList.add('has-image');
        showSizeInfo(w, h, newW, newH, true);
      }, 'image/jpeg', 0.92);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function showSizeInfo(origW, origH, newW, newH, resized) {
  if (resized) {
    showStatus('📐 圖片已自動縮放：' + origW + '×' + origH + ' → ' + newW + '×' + newH + ' px（相片紙尺寸）', 'info');
  } else {
    hideStatus();
  }
}
function onDragOver(e)  { e.preventDefault(); document.getElementById('uploadZone').classList.add('dragging'); }
function onDragLeave(e) { document.getElementById('uploadZone').classList.remove('dragging'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('dragging');
  var files = e.dataTransfer.files;
  if (files.length > 0) setFile(files[0]);
}

// ─── Status ────────────────────────────────────────────────────────────────────
function showStatus(msg, type) {
  var bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar ' + (type || 'info');
}
function hideStatus() {
  document.getElementById('statusBar').className = 'status-bar';
}

// ─── Process ────────────────────────────────────────────────────────────────────
async function processImage() {
  if (!selectedFile) { showStatus('請先上傳圖片', 'error'); return; }

  var baseUrl = getApiUrl();
  var submitBtn = document.getElementById('submitBtn');
  var spinner   = document.getElementById('spinner');
  var label     = document.getElementById('submitLabel');

  submitBtn.disabled = true;
  spinner.classList.add('show');
  label.textContent = '上傳中…';
  hideStatus();

  try {
    // 1. Upload image
    var formData = new FormData();
    formData.append('image', selectedFile);
    formData.append('overwrite', 'true');

    var uploadRes = await fetch(baseUrl + '/upload/image', { method: 'POST', body: formData });
    if (!uploadRes.ok) throw new Error('上傳圖片失敗 (' + uploadRes.status + ')');
    var uploadData = await uploadRes.json();
    var imageName = uploadData.name;

    // 2. Build & queue workflow
    label.textContent = '生成中…';
    var workflow = buildWorkflow(imageName, currentStyle);
    var promptRes = await fetch(baseUrl + '/prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: workflow })
    });
    if (!promptRes.ok) throw new Error('送出 workflow 失敗 (' + promptRes.status + ')');
    var promptData = await promptRes.json();
    var promptId = promptData.prompt_id;

    // 3. Poll for result
    var saveNodeId = STYLES[currentStyle].saveNodeId;
    var maxAttempts = 120;
    var attempt = 0;

    while (attempt < maxAttempts) {
      await new Promise(function(r) { setTimeout(r, 2000); });

      var histRes = await fetch(baseUrl + '/history/' + promptId);
      var histData = await histRes.json();

      if (histData[promptId] && histData[promptId].outputs) {
        var outputs = histData[promptId].outputs;
        var nodeOut = outputs[saveNodeId];
        if (nodeOut && nodeOut.images && nodeOut.images.length > 0) {
          var img = nodeOut.images[0];
          var imgUrl = baseUrl + '/view?filename=' + encodeURIComponent(img.filename)
            + '&subfolder=' + encodeURIComponent(img.subfolder || '')
            + '&type=' + encodeURIComponent(img.type || 'output');

          var imgRes = await fetch(imgUrl);
          resultBlob = await imgRes.blob();
          var objectUrl = URL.createObjectURL(resultBlob);

          document.getElementById('resultImg').src = objectUrl;
          document.getElementById('resultPlaceholder').style.display = 'none';
          document.getElementById('resultWrap').classList.add('show');

          showStatus('✨ 轉換完成！', 'info');
          break;
        }
      }
      attempt++;
    }

    if (attempt >= maxAttempts) throw new Error('處理超時，請稍後重試');

  } catch (err) {
    showStatus('❌ ' + (err.message || '處理失敗'), 'error');
  } finally {
    submitBtn.disabled = false;
    spinner.classList.remove('show');
    label.textContent = '開始轉換';
  }
}

// ─── Download ──────────────────────────────────────────────────────────────────
function downloadResult() {
  if (!resultBlob) return;
  var url = URL.createObjectURL(resultBlob);
  var a = document.createElement('a');
  a.href = url;
  a.download = currentStyle + '_' + Date.now() + '.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
