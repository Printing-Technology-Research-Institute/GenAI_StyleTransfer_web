<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風格魔法師</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0f;
  --surface: #16161a;
  --surface2: #1e1e24;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --accent: #c8a96e;
  --accent2: #e8c990;
  --text: #f0ede6;
  --muted: #8a8680;
  --danger: #c0614a;
  --success: #5a9e6f;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.5rem;
  height: 54px;
  border-bottom: 0.5px solid var(--border2);
  flex-shrink: 0;
}

.topbar-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.1rem;
  font-weight: 600;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.topbar-sub {
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-left: 12px;
}

.api-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  border-radius: 999px;
  padding: 6px 14px;
  transition: border-color 0.2s;
}

.api-pill:focus-within { border-color: var(--accent); }

.api-pill-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--border2);
  flex-shrink: 0;
  transition: background 0.3s;
}
.api-pill-dot.ok { background: var(--success); }

.api-pill input {
  background: none; border: none; outline: none;
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.04em;
  width: 210px;
}
.api-pill input::placeholder { color: var(--muted); }

.toggle-key-sm {
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  font-size: 0.65rem; font-family: 'Space Mono', monospace;
  letter-spacing: 0.04em; padding: 0;
}
.toggle-key-sm:hover { color: var(--text); }

/* Workspace */
.workspace {
  display: grid;
  grid-template-columns: minmax(420px, 44%) 1fr;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* Left panel */
.left-panel {
  border-right: 0.5px solid var(--border2);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}

.left-panel::-webkit-scrollbar { width: 3px; }
.left-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.section {
  padding: 1.1rem 1.3rem;
  border-bottom: 0.5px solid var(--border);
}

.section-label {
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 7px;
}

.step-num {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.58rem; color: var(--muted);
  flex-shrink: 0; transition: all 0.2s;
}
.step-num.done {
  background: rgba(200,169,110,0.15);
  border-color: var(--accent);
  color: var(--accent);
}

/* Upload */
.upload-zone {
  border: 1.5px dashed var(--border2);
  border-radius: 11px;
  padding: 1.6rem 1rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: rgba(200,169,110,0.04);
}
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-zone svg { opacity: 0.35; margin-bottom: 0.5rem; }
.upload-zone strong { display: block; font-size: 0.78rem; color: var(--text); margin-bottom: 0.2rem; }
.upload-zone p { font-size: 0.68rem; color: var(--muted); line-height: 1.7; }

.thumb-wrap {
  display: none;
  position: relative;
  border-radius: 11px;
  overflow: hidden;
  aspect-ratio: 4/3;
  background: var(--surface2);
}
.thumb-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
.thumb-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 55%, rgba(13,13,15,0.85));
}
.thumb-name {
  position: absolute; bottom: 9px; left: 11px;
  font-size: 0.65rem; color: rgba(255,255,255,0.5);
  max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.thumb-change {
  position: absolute; bottom: 9px; right: 9px;
  background: rgba(255,255,255,0.1);
  border: 0.5px solid var(--border2);
  border-radius: 6px; color: var(--text); cursor: pointer;
  padding: 4px 11px; font-size: 0.65rem;
  font-family: 'Space Mono', monospace; letter-spacing: 0.04em;
}
.thumb-change:hover { background: rgba(255,255,255,0.2); }

/* Style grid */
.style-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}

.style-btn {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 0.7rem 0.75rem;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.style-btn:hover { border-color: var(--accent); background: rgba(200,169,110,0.05); }
.style-btn.selected {
  border-color: var(--accent);
  background: rgba(200,169,110,0.09);
  box-shadow: inset 0 0 0 1px rgba(200,169,110,0.2);
}
.style-btn .emoji { font-size: 1.2rem; display: block; margin-bottom: 0.28rem; }
.style-btn .name { font-size: 0.78rem; font-weight: 700; color: var(--text); display: block; }
.style-btn .desc { font-size: 0.62rem; color: var(--muted); margin-top: 1px; display: block; }

/* Model */
.model-row { display: flex; gap: 7px; }
.model-btn {
  flex: 1;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 0.55rem 0.75rem;
  cursor: pointer; transition: all 0.15s; text-align: left;
}
.model-btn:hover { border-color: var(--accent); }
.model-btn.selected {
  border-color: var(--accent);
  background: rgba(200,169,110,0.09);
}
.model-btn .mname { font-size: 0.73rem; font-weight: 700; color: var(--text); display: block; }
.model-btn .mdesc { font-size: 0.6rem; color: var(--muted); margin-top: 1px; display: block; }

/* Error */
#error-msg {
  display: none;
  margin: 0.6rem 1.3rem 0;
  padding: 9px 13px;
  background: rgba(192,97,74,0.1);
  border: 0.5px solid var(--danger);
  border-radius: 8px;
  color: #e07a65;
  font-size: 0.7rem;
  line-height: 1.6;
}

/* Generate button */
.generate-wrap { padding: 0.9rem 1.3rem 1.3rem; }

#generate-btn {
  width: 100%;
  background: var(--accent);
  color: #1a1408;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: 'Space Mono', monospace;
  font-size: 0.83rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
#generate-btn:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); }
#generate-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

.loading-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 0%; background: rgba(255,255,255,0.18);
  transition: width 0.5s ease;
}

/* Right panel */
.right-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  position: relative;
  overflow: hidden;
  min-height: 0;
}

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
}
.empty-state svg { opacity: 0.2; }
.empty-state p { font-size: 0.75rem; color: var(--muted); text-align: center; line-height: 1.9; }

/* Loading overlay */
#loading-overlay {
  display: none;
  position: absolute; inset: 0;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1.2rem;
  background: rgba(13,13,15,0.55);
  backdrop-filter: blur(6px);
  z-index: 10;
}
#loading-overlay.active { display: flex; }

.spinner {
  width: 38px; height: 38px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-msg { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; }
.loading-tip { font-size: 0.62rem; color: var(--border2); letter-spacing: 0.08em; margin-top: 3px; text-align: center; }

/* Result */
#result-area {
  display: none;
  width: 100%;
  height: 100%;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.9rem;
  animation: fadeUp 0.35s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.result-img-container {
  position: relative;
  border-radius: 13px;
  overflow: hidden;
  border: 0.5px solid var(--border2);
  max-width: 100%;
}
.result-img-container img {
  display: block;
  max-width: 100%;
  max-height: calc(100vh - 54px - 120px);
  object-fit: contain;
}
.result-badge {
  position: absolute; top: 11px; left: 11px;
  background: rgba(13,13,15,0.7);
  border: 0.5px solid var(--border2);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 0.62rem; letter-spacing: 0.1em; color: var(--accent);
}

.result-actions { display: flex; gap: 8px; }

.btn-action {
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  border-radius: 8px;
  padding: 9px 18px;
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.05em;
  cursor: pointer; text-decoration: none;
  display: inline-flex; align-items: center; gap: 5px;
  transition: all 0.15s;
}
.btn-action:hover { border-color: var(--accent); color: var(--accent); }

.btn-action.primary {
  background: var(--accent); border-color: var(--accent); color: #1a1408;
}
.btn-action.primary:hover { background: var(--accent2); border-color: var(--accent2); color: #1a1408; }

@media (max-width: 720px) {
  html, body { overflow: auto; }
  .workspace { grid-template-columns: 1fr; }
  .right-panel { min-height: 380px; border-top: 0.5px solid var(--border2); }
  .api-pill input { width: 130px; }
  .topbar-sub { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;">
    <span class="topbar-title">風格魔法師</span>
    <span class="topbar-sub">Gemini Vision</span>
  </div>
  <div class="api-pill">
    <div class="api-pill-dot" id="key-dot"></div>
    <input type="password" id="api-key" placeholder="貼上 Gemini API Key" spellcheck="false" autocomplete="off">
    <button class="toggle-key-sm" onclick="toggleKey()">顯示</button>
  </div>
</div>

<div class="workspace">

  <!-- LEFT -->
  <div class="left-panel">

    <div class="section">
      <div class="section-label">
        <span class="step-num" id="step1-dot">1</span>上傳圖片
      </div>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/*">
        <svg width="34" height="34" viewBox="0 0 48 48" fill="none">
          <rect x="6" y="10" width="36" height="28" rx="4" stroke="#c8a96e" stroke-width="1.5"/>
          <circle cx="17" cy="20" r="3.5" stroke="#c8a96e" stroke-width="1.5"/>
          <path d="M6 32 L15 23 L22 30 L30 22 L42 34" stroke="#c8a96e" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M31 10 L31 4 M31 4 L28 7 M31 4 L34 7" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <strong>點擊選擇 或 拖曳圖片</strong>
        <p>支援 JPG · PNG · WEBP<br>過大圖片會等比例縮至長邊約 1800px（約相片紙可印）</p>
      </div>
      <div class="thumb-wrap" id="thumb-wrap">
        <img id="thumb-img" src="" alt="預覽">
        <div class="thumb-overlay"></div>
        <span class="thumb-name" id="thumb-name"></span>
        <button class="thumb-change" onclick="resetUpload()">重新選擇</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">
        <span class="step-num done" id="step2-dot">2</span>選擇風格
      </div>
      <div class="style-grid">
        <div class="style-btn selected" data-style="ghibli" onclick="selectStyle(this)">
          <span class="emoji">🌿</span>
          <span class="name">吉卜力</span>
          <span class="desc">宮崎駿手繪動畫</span>
        </div>
        <div class="style-btn" data-style="chibi" onclick="selectStyle(this)">
          <span class="emoji">🎮</span>
          <span class="name">Q 版</span>
          <span class="desc">大頭可愛卡通</span>
        </div>
        <div class="style-btn" data-style="painting" onclick="selectStyle(this)">
          <span class="emoji">🎨</span>
          <span class="name">油畫</span>
          <span class="desc">厚重印象派筆觸</span>
        </div>
        <div class="style-btn" data-style="sketch" onclick="selectStyle(this)">
          <span class="emoji">✏️</span>
          <span class="name">彩色素描</span>
          <span class="desc">手繪彩鉛風格</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">
        <span class="step-num done">3</span>選擇模型
      </div>
      <div class="model-row">
        <div class="model-btn selected" data-model="gemini-2.5-flash-image" onclick="selectModel(this)">
          <span class="mname">2.5 Flash</span>
          <span class="mdesc">免費額度 · 建議</span>
        </div>
        <div class="model-btn" data-model="gemini-3.1-flash-image-preview" onclick="selectModel(this)">
          <span class="mname">3.1 Flash</span>
          <span class="mdesc">付費 · 最新</span>
        </div>
      </div>
    </div>

    <div id="error-msg"></div>

    <div class="generate-wrap">
      <button id="generate-btn" onclick="generate()">
        <div class="loading-bar" id="loading-bar"></div>
        <span id="btn-text">✦ 開始轉換</span>
      </button>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right-panel">

    <div id="loading-overlay">
      <div class="spinner"></div>
      <div>
        <div class="loading-msg" id="loading-msg">正在施魔法...</div>
        <div class="loading-tip">通常需要 10–30 秒</div>
      </div>
    </div>

    <div class="empty-state" id="empty-state">
      <svg width="60" height="60" viewBox="0 0 64 64" fill="none">
        <rect x="8" y="14" width="48" height="36" rx="5" stroke="#c8a96e" stroke-width="1.2"/>
        <circle cx="22" cy="26" r="5" stroke="#c8a96e" stroke-width="1.2"/>
        <path d="M8 40 L20 28 L30 38 L40 28 L56 44" stroke="#c8a96e" stroke-width="1.2" stroke-linejoin="round"/>
        <path d="M44 14 L44 6 M44 6 L40 10 M44 6 L48 10" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p>上傳圖片並選擇風格<br>點擊左側「開始轉換」</p>
    </div>

    <div id="result-area">
      <div class="result-img-container">
        <img id="result-img" src="" alt="轉換結果">
        <span class="result-badge" id="style-badge">吉卜力</span>
      </div>
      <div class="result-actions">
        <a id="dl-btn" class="btn-action" download="style_transfer.png">↓ 下載</a>
        <button class="btn-action primary" onclick="resetResult()">再轉一張</button>
      </div>
    </div>

  </div>
</div>

<script>
const STYLE_MAP = {
    ghibli: { name: "吉卜力", prompt: "Transform this image into a Studio Ghibli-style illustration. Keep the original composition, pose, and subject clearly recognizable. Render it as a soft hand-drawn animation frame with watercolor textures, gentle shading, warm natural lighting, and slightly simplified details. Use pastel colors, soft edges, and a cozy, dreamy atmosphere."  },
    chibi:  { name: "Q 版",   prompt: "Convert this image into a chibi anime style. Keep the character identity and pose recognizable. Redesign with a big round head, tiny body, simplified limbs, and large expressive eyes. Use clean lines, smooth coloring, and a cute kawaii anime aesthetic." },
    painting: { name: "油畫", prompt: "Transform this image into an expressive oil painting while preserving the original composition and subject. Use visible brush strokes, rich paint texture, and slightly abstract for" },
    sketch: { name: "彩色素描", prompt: "Convert this image into a colored pencil sketch. Keep the original structure and subject clear. Use visible pencil strokes, soft shading, light hatching, and hand-drawn outlines. Apply gentle color fills with a sketchbook style appearance." }
  };

const MSGS = ["正在施魔法...", "融合風格中...", "手繪細節中...", "快好了..."];

/** 長邊上限（約 6 吋 @300dpi，等比例縮小後約可印一張相片紙） */
const MAX_IMAGE_LONG_EDGE = 1800;

let selectedStyle = 'ghibli';
let selectedModel = 'gemini-2.5-flash-image';
let currentFile = null;
/** @type {string|null} 預覽用 blob URL，需在更換或重設時 revoke */
let thumbObjectUrl = null;
let msgTimer = null;

function selectStyle(el) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedStyle = el.dataset.style;
}

function selectModel(el) {
  document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedModel = el.dataset.model;
}

function resetUpload() {
  currentFile = null;
  if (thumbObjectUrl) {
    URL.revokeObjectURL(thumbObjectUrl);
    thumbObjectUrl = null;
  }
  document.getElementById('thumb-wrap').style.display = 'none';
  document.getElementById('upload-zone').style.display = 'block';
  document.getElementById('file-input').value = '';
  document.getElementById('step1-dot').classList.remove('done');
}

/**
 * 將圖檔載入為 HTMLImageElement。
 * @param {File} file
 * @returns {Promise<HTMLImageElement>}
 */
function loadImageFromFile(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('無法讀取圖片')); };
    img.src = url;
  });
}

/**
 * 等比例縮小：長邊不超過 maxLongEdge，輸出 JPEG 以減少上傳體積。
 * 若原圖已夠小則回傳原 File。
 * @param {File} file
 * @param {number} maxLongEdge
 * @returns {Promise<File>}
 */
async function resizeImageForUpload(file, maxLongEdge) {
  const img = await loadImageFromFile(file);
  const w = img.naturalWidth;
  const h = img.naturalHeight;
  const long = Math.max(w, h);
  if (!long || long <= maxLongEdge) return file;

  const scale = maxLongEdge / long;
  const nw = Math.max(1, Math.round(w * scale));
  const nh = Math.max(1, Math.round(h * scale));
  const canvas = document.createElement('canvas');
  canvas.width = nw;
  canvas.height = nh;
  const ctx = canvas.getContext('2d');
  if (!ctx) throw new Error('無法建立畫布');
  ctx.drawImage(img, 0, 0, nw, nh);

  const blob = await new Promise((resolve, reject) => {
    canvas.toBlob(
      (b) => (b ? resolve(b) : reject(new Error('輸出圖片失敗'))),
      'image/jpeg',
      0.92
    );
  });
  const base = file.name.replace(/\.[^.]+$/, '') || 'image';
  return new File([blob], base + '_upload.jpg', { type: 'image/jpeg' });
}

function toggleKey() {
  const inp = document.getElementById('api-key');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  inp.nextElementSibling.textContent = inp.type === 'password' ? '顯示' : '隱藏';
}

document.getElementById('api-key').addEventListener('input', function() {
  document.getElementById('key-dot').classList.toggle('ok', this.value.trim().length > 20);
  sessionStorage.setItem('gemini_key', this.value);
});

document.getElementById('file-input').addEventListener('change', function() {
  if (this.files[0]) void handleFile(this.files[0]);
});

const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) void handleFile(f);
});

/**
 * 處理選取的圖檔：縮小後存為 currentFile，並更新預覽。
 * @param {File} file
 * @returns {Promise<void>}
 */
async function handleFile(file) {
  hideError();
  try {
    const processed = await resizeImageForUpload(file, MAX_IMAGE_LONG_EDGE);
    currentFile = processed;
    if (thumbObjectUrl) URL.revokeObjectURL(thumbObjectUrl);
    thumbObjectUrl = URL.createObjectURL(processed);
    document.getElementById('thumb-img').src = thumbObjectUrl;
    document.getElementById('thumb-name').textContent = processed.name;
    document.getElementById('upload-zone').style.display = 'none';
    document.getElementById('thumb-wrap').style.display = 'block';
    document.getElementById('step1-dot').classList.add('done');
  } catch (err) {
    showError('圖片處理失敗：' + (err && err.message ? err.message : String(err)));
    resetUpload();
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() { document.getElementById('error-msg').style.display = 'none'; }

function setLoading(on) {
  const btn = document.getElementById('generate-btn');
  btn.disabled = on;
  document.getElementById('btn-text').textContent = on ? '轉換中...' : '✦ 開始轉換';
  document.getElementById('loading-bar').style.width = on ? '80%' : '0%';
  const overlay = document.getElementById('loading-overlay');
  if (on) {
    overlay.classList.add('active');
    document.getElementById('empty-state').style.display = 'none';
    let i = 0;
    msgTimer = setInterval(() => {
      document.getElementById('loading-msg').textContent = MSGS[i++ % MSGS.length];
    }, 3500);
  } else {
    overlay.classList.remove('active');
    clearInterval(msgTimer);
  }
}

async function generate() {
  hideError();
  if (!currentFile) { showError('請先上傳一張圖片'); return; }
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { showError('請輸入 Gemini API Key'); return; }

  setLoading(true);
  document.getElementById('result-area').style.display = 'none';

  try {
    const base64 = await toBase64(currentFile);
    const body = {
      contents: [{ parts: [
        { text: STYLE_MAP[selectedStyle].prompt+"Maintain high clarity, clean structure, and avoid distortion." },
        { inline_data: { mime_type: currentFile.type || 'image/jpeg', data: base64 } }
      ]}],
      generationConfig: { responseModalities: ["IMAGE", "TEXT"] }
    };

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );
    const data = await res.json();
    if (!res.ok) throw new Error(data?.error?.message || '未知錯誤');

    let imgData = null;
    for (const p of (data?.candidates?.[0]?.content?.parts || [])) {
      if (p.inlineData?.data) { imgData = p.inlineData; break; }
    }
    if (!imgData) throw new Error('API 未回傳圖片，請確認 model 名稱或帳號權限');

    const dataUrl = `data:${imgData.mimeType};base64,${imgData.data}`;
    showResult(dataUrl);
  } catch (e) {
    showError('錯誤：' + e.message);
    document.getElementById('empty-state').style.display = 'flex';
  } finally {
    setLoading(false);
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function showResult(dataUrl) {
  const name = STYLE_MAP[selectedStyle].name;
  document.getElementById('result-img').src = dataUrl;
  document.getElementById('dl-btn').href = dataUrl;
  document.getElementById('style-badge').textContent = name;
  document.getElementById('result-area').style.display = 'flex';
  document.getElementById('empty-state').style.display = 'none';
}

function resetResult() {
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
}

const saved = sessionStorage.getItem('gemini_key');
if (saved) {
  document.getElementById('api-key').value = saved;
  if (saved.length > 20) document.getElementById('key-dot').classList.add('ok');
}
</script>
</body>
</html>
